<!DOCTYPE html>
<html lang="pt-br">
<head>

<title>ogr Aranha</title>
<style>

    padding: 0;
    background: linear-gradient(black, #0f0f0f);

    text-align: center;
}

.container {
    margin-top: 150px;
}

h1 {
    font-size: 40px;
    color: #00ffcc;
}

p {

}

button {

    padding: 15px 30px;
    font-size: 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00aa88;
    transform: scale(1.05);
}
</style>
</head>
<body>

<div class="container">
    <h1>🕷️ ogr Aranha</h1>

    <button onclick="entrarDiscord()">Entrar no Discord</button>
</div>

<script>
function entrarDiscord() {
    window.location.href = "https://discord.gg/KHD7YF64U";
}
</script>

</body>
</html>
