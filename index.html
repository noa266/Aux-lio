<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>HTSZ NOAH</title>
<style>
body {
    background: radial-gradient(circle, #050510, #000000);
    font-family: Arial;
    color: #00ffff;
}

#painel {
    width: 320px;
    background: rgba(0,0,0,0.85);
    border: 2px solid #00ffff;
    border-radius: 15px;
    box-shadow: 0 0 20px #00ffff;
    padding: 15px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.titulo {
    text-align: center;
    font-size: 20px;
    margin-bottom: 10px;
    color: #00ffff;
}

.linha {
    border-bottom: 1px solid #00ffff;
    margin: 10px 0;
}

button {
    background: #001f1f;
    color: #00ffff;
    border: 1px solid #00ffff;
    padding: 5px;
    border-radius: 5px;
}

input[type=range] {
    width: 100%;
}

.hideBtn {
    position: absolute;
    top: -10px;
    right: -10px;
    background: red;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    border: none;
    color: white;
}
</style>
</head>
<body>

<div id="painel">
<button class="hideBtn" onclick="togglePainel()">X</button>

<div class="titulo">HTSZ NOAH</div>

<label><input type="checkbox"> AimLock</label><br>
<label><input type="checkbox"> No Recoil</label><br>
<label><input type="checkbox"> ESP Ativar</label><br>
<label><input type="checkbox"> Linha ESP</label><br>
<label><input type="checkbox"> Caixa ESP</label><br>
<label><input type="checkbox"> Vida ESP</label><br>
<label><input type="checkbox"> Distância ESP</label><br>

<div class="linha"></div>

Aim FOV: <span id="fovValor">0</span>
<input type="range" min="0" max="100" value="0" oninput="fovUpdate(this.value)">

<div class="linha"></div>

Target:
<select>
<option>Cabeça</option>
<option>Peito</option>
<option>Pescoço</option>
</select>

<div class="linha"></div>

<button onclick="ativar()">ATIVAR</button>

</div>

<script>
function fovUpdate(valor){
    document.getElementById("fovValor").innerText = valor;
}

function ativar(){
    alert("HTSZ NOAH Ativado");
}

function togglePainel(){
    var p = document.getElementById("painel");
    if(p.style.display == "none"){
        p.style.display = "block";
    } else {
        p.style.display = "none";
    }
}
</script>

</body>
</html>
